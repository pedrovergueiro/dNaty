name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11']

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install numpy>=1.24.0 scipy>=1.10.0 tqdm>=4.65.0
          pip install pytest pytest-cov

      - name: Run tests
        run: pytest tests/ -v --cov=dnaty --cov-report=xml --ignore=tests/test_docker.py --ignore=tests/test_e2e_integration.py --ignore=tests/test_load.py --ignore=tests/test_auth_rate_limit.py -x

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        continue-on-error: true
        with:
          files: ./coverage.xml

  release:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    needs: [backend-tests]

    steps:
      - uses: actions/checkout@v3

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
