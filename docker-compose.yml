version: '3.9'

services:
  redis:
    image: redis:7-alpine
    container_name: dnaty-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - dnaty-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:latest
    container_name: dnaty-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    networks:
      - dnaty-network
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

  dnaty-cpu:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: dnaty-cpu
    image: dnaty:latest-cpu
    volumes:
      - ./notebooks:/app/notebooks
      - ./results:/app/results
    environment:
      PYTHONUNBUFFERED: 1
    command: python -c "from dnaty import compress; print('dNATY CPU ready!')"
    networks:
      - dnaty-network

  dnaty-gpu:
    build:
      context: .
      dockerfile: Dockerfile
      target: gpu
    container_name: dnaty-gpu
    image: dnaty:latest-gpu
    volumes:
      - ./notebooks:/app/notebooks
      - ./results:/app/results
    environment:
      CUDA_VISIBLE_DEVICES: 0
      PYTHONUNBUFFERED: 1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    command: python -c "from dnaty import compress; print('dNATY GPU ready!')"
    networks:
      - dnaty-network

  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: dnaty-celery
    image: dnaty:latest-worker
    volumes:
      - ./dnaty_saas:/app/dnaty_saas
      - ./results:/app/results
    environment:
      PYTHONUNBUFFERED: 1
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    command: celery -A dnaty_saas.tasks worker --loglevel=info --concurrency=2
    depends_on:
      - redis
    networks:
      - dnaty-network

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: dnaty-api
    image: dnaty:latest-api
    ports:
      - "8000:8000"
    volumes:
      - ./dnaty_saas:/app/dnaty_saas
      - ./results:/app/results
    environment:
      PYTHONUNBUFFERED: 1
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
    command: uvicorn dnaty_saas.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - redis
      - prometheus
    networks:
      - dnaty-network

networks:
  dnaty-network:
    driver: bridge

volumes:
  dnaty-results:
  dnaty-models:
  redis-data:
  prometheus-data:
